<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bye LOL</title>
  <!-- Link to Google Fonts for Pixelify Sans -->
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: black;
      color: white;
      font-family: 'Pixelify Sans', sans-serif; /* Apply Pixelify Sans font */
      font-size: 48px;
      overflow: hidden;
      text-align: center;
    }

    #text {
      opacity: 1;
      white-space: nowrap;
      font-weight: bold;
      letter-spacing: 2px;
    }

  </style>
</head>
<body>
  <div id="text"></div>

  <script>
    const textElement = document.getElementById('text');
    const message = "your machine has been compromised, goodbye.";

    let charIndex = 0;

    function typeMessage() {
      textElement.innerHTML = message.substring(0, charIndex);
      charIndex++;

      if (charIndex <= message.length) {
        setTimeout(typeMessage, 100); // Typing speed (100ms per character)
      }
    }

    typeMessage(); // Start typing the message
  </script>
</body>
</html>
